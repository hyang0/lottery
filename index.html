<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>幸运大抽奖</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #ff6b6b;
            --secondary-color: #4ecdc4;
            --dark-color: #292f36;
            --light-color: #f7fff7;
            --accent-color: #ffd166;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Noto Sans SC', Arial, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            color: var(--dark-color);
            line-height: 1.6;
            padding: 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        header h1 {
            color: var(--primary-color);
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        
        .section {
            background-color: white;
            border-radius: 10px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .section h2 {
            color: var(--secondary-color);
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        
        .form-group {
            margin-bottom: 15px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px;
        }
        
        label {
            font-weight: bold;
            margin-right: 10px;
        }
        
        input[type="text"],
        input[type="number"],
        select {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            flex: 1;
            min-width: 150px;
        }
        
        .btn {
            padding: 10px 20px;
            cursor: pointer;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        
        .btn:hover {
            background: #e05050;
            transform: translateY(-2px);
            box-shadow: 0 5px 10px rgba(0,0,0,0.1);
        }
        
        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .btn-secondary {
            background: var(--secondary-color);
        }
        
        .btn-secondary:hover {
            background: #3db9b0;
        }
        
        .btn-accent {
            background: var(--accent-color);
            color: var(--dark-color);
        }
        
        .btn-accent:hover {
            background: #e6bc5c;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background-color: white;
            border-radius: 5px;
            overflow: hidden;
        }
        
        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        
        th {
            background-color: var(--secondary-color);
            color: white;
            font-weight: bold;
        }
        
        tr:hover {
            background-color: #f5f5f5;
        }
        
        .file-upload {
            position: relative;
            overflow: hidden;
            margin: 10px 0;
            background: var(--light-color);
            border: 2px dashed var(--secondary-color);
            border-radius: 5px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s ease;
        }
        
        .file-upload:hover {
            background: #eef7f7;
        }
        
        .file-upload input[type="file"] {
            position: absolute;
            font-size: 100px;
            opacity: 0;
            right: 0;
            top: 0;
            cursor: pointer;
        }
        
        .file-upload-label {
            display: block;
            font-weight: bold;
            color: var(--secondary-color);
            margin-bottom: 10px;
        }
        
        .draw-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 20px 0;
        }
        
        .name-display {
            width: 400px;
            height: 200px;
            border: 3px solid var(--primary-color);
            border-radius: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 48px;
            font-weight: bold;
            color: var(--primary-color);
            background: linear-gradient(135deg, #fff 0%, #f8f9fa 100%);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin: 30px 0;
            position: relative;
            overflow: hidden;
        }
        
        .name-display.spinning {
            animation: nameGlow 0.5s ease-in-out infinite alternate;
        }
        
        @keyframes nameGlow {
            0% {
                box-shadow: 0 10px 30px rgba(0,0,0,0.1);
                border-color: var(--primary-color);
            }
            100% {
                box-shadow: 0 10px 30px rgba(255, 107, 107, 0.4),
                           0 0 50px rgba(255, 107, 107, 0.3);
                border-color: #ff8e8e;
            }
        }
        
        .current-name {
            transition: all 0.3s ease;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }
        
        .winner-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.7) 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.8s ease;
        }
        
        .winner-modal.active {
            opacity: 1;
            visibility: visible;
        }
        
        .winner-content {
            background: linear-gradient(135deg, 
                #ff9a9e 0%, #fecfef 25%, #fecfef 75%, #fad0c4 100%);
            padding: 60px 40px;
            border-radius: 30px;
            text-align: center;
            max-width: 90%;
            transform: scale(0.3) rotate(-10deg);
            transition: all 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            box-shadow: 0 25px 50px rgba(0,0,0,0.4),
                        0 0 100px rgba(255, 107, 107, 0.3);
            border: 5px solid rgba(255, 255, 255, 0.3);
            position: relative;
            overflow: hidden;
        }
        
        .winner-modal.active .winner-content {
            transform: scale(1) rotate(0deg);
        }
        
        .winner-prize {
            font-size: 42px;
            color: var(--dark-color);
            margin-bottom: 30px;
            position: relative;
            z-index: 2;
        }
        
        .winner-name {
            font-size: 72px;
            font-weight: bold;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4, #ffd166);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 40px;
            position: relative;
            z-index: 2;
            animation: nameGradient 3s ease-in-out infinite;
        }
        
        @keyframes nameGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .close-modal {
            background: linear-gradient(135deg, #4ecdc4, #44a08d);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            z-index: 2;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .close-modal:hover {
            background: linear-gradient(135deg, #44a08d, #4ecdc4);
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }
        
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 999;
        }
        
        .particle {
            position: absolute;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            animation: particleFloat 4s ease-in-out infinite;
        }
        
        @keyframes particleFloat {
            0%, 100% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10%, 90% {
                opacity: 1;
            }
            50% {
                transform: translateY(-10px) rotate(180deg);
            }
        }
        
        .draw-hint {
            text-align: center;
            margin: 20px 0;
            padding: 15px;
            background: linear-gradient(135deg, #e3f2fd, #bbdefb);
            border-radius: 10px;
            border-left: 4px solid var(--secondary-color);
        }
        
        .draw-hint strong {
            color: var(--primary-color);
            font-size: 18px;
        }
        
        @media (max-width: 768px) {
            .name-display {
                width: 300px;
                height: 150px;
                font-size: 36px;
            }
            
            .winner-name {
                font-size: 48px;
            }
            
            .winner-prize {
                font-size: 32px;
            }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>
<div class="container">
    <header>
        <h1>幸运抽奖系统</h1>
        <p>添加奖品、导入名单、开始抽奖</p>
    </header>

    <div class="section" id="prize-section">
        <h2>1. 添加奖品</h2>
        <div class="form-group">
            <label for="prize-name">奖品名称：</label>
            <input type="text" id="prize-name" placeholder="请输入奖品名称">
            <label for="prize-qty">数量：</label>
            <input type="number" id="prize-qty" min="1" value="1">
            <button class="btn" id="add-prize">添加奖品</button>
        </div>

        <h3>奖品列表</h3>
        <table class="prize-list" id="prize-table">
            <thead>
                <tr>
                    <th>奖品名称</th>
                    <th>总数量</th>
                    <th>剩余</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <div class="section" id="participants-section">
        <h2>2. 导入抽奖者名单</h2>
        <div class="file-upload">
            <span class="file-upload-label">点击或拖拽Excel文件到此处</span>
            <input type="file" id="file-input" accept=".xlsx,.xls,.csv">
            <p>支持 .xlsx, .xls, .csv 格式</p>
        </div>
        <p id="file-status"></p>
    </div>

    <div class="section" id="draw-section">
        <h2>3. 开始抽奖</h2>
        
        <div class="form-group">
            <label for="prize-select">选择奖品：</label>
            <select id="prize-select"></select>
        </div>
        
        <div class="draw-container">
            <div class="name-display" id="name-display">
                <div class="current-name" id="current-name">请先导入名单</div>
            </div>
            
            <div class="form-group" style="justify-content: center; margin-top: 20px;">
                <button class="btn" id="draw-btn">开始抽奖</button>
                <button class="btn btn-accent" id="reset-btn">重置</button>
            </div>
            
            <div class="draw-hint">
                <p><strong>操作说明：</strong></p>
                <p>1. 点击"开始抽奖"后，名单开始快速滚动</p>
                <p>2. 按<strong>空格键</strong>停止滚动并确定获奖者</p>
                <p>3. 每次只能抽取一个奖品的一个名额</p>
            </div>
        </div>
        
        <h3>中奖名单</h3>
        <table class="winner-list" id="winner-table">
            <thead>
                <tr>
                    <th>奖品</th>
                    <th>获奖者</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<div class="winner-modal" id="winner-modal">
    <div class="winner-content">
        <div class="winner-prize" id="modal-prize"></div>
        <div class="winner-name" id="modal-winner"></div>
        <button class="close-modal" id="close-modal">确定</button>
    </div>
</div>

<script>
    const prizes = [];
    let participants = [];
    const winners = new Set();
    let isSpinning = false;
    let currentPrize = null;
    let spinInterval = null;
    
    const nameDisplay = document.getElementById('name-display');
    const currentNameEl = document.getElementById('current-name');
    const drawBtn = document.getElementById('draw-btn');
    const winnerModal = document.getElementById('winner-modal');
    const modalPrize = document.getElementById('modal-prize');
    const modalWinner = document.getElementById('modal-winner');
    const closeModal = document.getElementById('close-modal');
    
    document.getElementById('add-prize').addEventListener('click', () => {
        const name = document.getElementById('prize-name').value.trim();
        const qty = parseInt(document.getElementById('prize-qty').value, 10);
        if (!name || isNaN(qty) || qty <= 0) {
            alert('请输入有效的奖品名称和数量');
            return;
        }
        const existing = prizes.find(p => p.name === name);
        if (existing) {
            existing.total += qty;
            existing.remaining += qty;
        } else {
            prizes.push({name, total: qty, remaining: qty});
        }
        renderPrizeTable();
        document.getElementById('prize-name').value = '';
        document.getElementById('prize-qty').value = 1;
    });

    function renderPrizeTable() {
        const tbody = document.querySelector('#prize-table tbody');
        tbody.innerHTML = '';
        const select = document.getElementById('prize-select');
        if (select) {
            select.innerHTML = '';
        }
        prizes.forEach(p => {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${p.name}</td><td>${p.total}</td><td>${p.remaining}</td>`;
            tbody.appendChild(tr);
            if (select && p.remaining > 0) {
                const option = document.createElement('option');
                option.value = p.name;
                option.textContent = `${p.name} (剩余 ${p.remaining})`;
                select.appendChild(option);
            }
        });
    }

    document.getElementById('file-input').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        const status = document.getElementById('file-status');
        status.textContent = '正在读取文件...';
        
        reader.onload = (evt) => {
            try {
                const data = new Uint8Array(evt.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                const firstSheet = workbook.SheetNames[0];
                const sheet = workbook.Sheets[firstSheet];
                const json = XLSX.utils.sheet_to_json(sheet, {header: 1});
                participants = json.slice(1).map(row => ({name: String(row[0]).trim()}))
                                       .filter(p => p.name);
                status.textContent = `已成功导入 ${participants.length} 位抽奖者`;
                status.style.color = 'green';
                updateNameDisplay();
            } catch (error) {
                status.textContent = '文件解析失败: ' + error.message;
                status.style.color = 'red';
            }
        };
        reader.onerror = () => {
            status.textContent = '读取文件失败';
            status.style.color = 'red';
        };
        reader.readAsArrayBuffer(file);
    });

    function updateNameDisplay() {
        const available = participants.filter(p => !winners.has(p.name));
        if (available.length === 0) {
            currentNameEl.textContent = '所有人员已中奖';
            return;
        }
        
        if (!isSpinning) {
            currentNameEl.textContent = `共 ${available.length} 人待抽奖`;
        }
    }

    document.getElementById('draw-btn').addEventListener('click', () => {
        if (isSpinning) return;
        
        if (prizes.length === 0) {
            alert('请先添加奖品');
            return;
        }
        if (participants.length === 0) {
            alert('请先导入抽奖者名单');
            return;
        }
        
        let available = participants.filter(p => !winners.has(p.name));
        if (available.length === 0) {
            alert('所有抽奖者已中奖，无法继续抽奖');
            return;
        }
        
        const select = document.getElementById('prize-select');
        let prize;
        if (select && select.value) {
            prize = prizes.find(p => p.name === select.value);
        }
        
        if (!prize || prize.remaining <= 0) {
            prize = prizes.find(p => p.remaining > 0);
        }
        
        if (!prize) {
            alert('所有奖品已抽完');
            return;
        }
        
        startDrawing(prize);
    });
    
    function startDrawing(prize) {
        isSpinning = true;
        currentPrize = prize;
        
        drawBtn.disabled = true;
        drawBtn.textContent = '抽奖中...按空格键停止';
        
        nameDisplay.classList.add('spinning');
        createParticles();
        
        const available = participants.filter(p => !winners.has(p.name));
        
        spinInterval = setInterval(() => {
            const randomIndex = Math.floor(Math.random() * available.length);
            currentNameEl.textContent = available[randomIndex].name;
        }, 100);
    }
    
    function stopDrawing() {
        if (!isSpinning) return;
        
        clearInterval(spinInterval);
        isSpinning = false;
        
        nameDisplay.classList.remove('spinning');
        
        drawBtn.disabled = false;
        drawBtn.textContent = '开始抽奖';
        
        const available = participants.filter(p => !winners.has(p.name));
        const winnerIndex = Math.floor(Math.random() * available.length);
        const winner = available[winnerIndex];
        
        currentNameEl.textContent = winner.name;
        
        setTimeout(() => {
            announceWinner(currentPrize, winner);
        }, 500);
    }
    
    function announceWinner(prize, winner) {
        winners.add(winner.name);
        prize.remaining--;
        
        renderWinnerTable([{prize: prize.name, name: winner.name}]);
        renderPrizeTable();
        
        if (typeof confetti === 'function') {
            confetti({
                particleCount: 100,
                spread: 70,
                origin: { y: 0.6 }
            });
            
            setTimeout(() => {
                confetti({
                    particleCount: 50,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 }
                });
            }, 250);
            
            setTimeout(() => {
                confetti({
                    particleCount: 50,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 }
                });
            }, 400);
        }
        
        modalPrize.textContent = `恭喜获得 ${prize.name}`;
        modalWinner.textContent = winner.name;
        winnerModal.classList.add('active');
        
        createWinnerEffects();
        updateNameDisplay();
    }
    
    function createWinnerEffects() {
        const flash = document.createElement('div');
        flash.style.cssText = `
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255,255,255,0.8) 0%, transparent 70%);
            pointer-events: none;
            z-index: 999;
            animation: flashEffect 0.5s ease-out;
        `;
        
        const style = document.createElement('style');
        style.textContent = `
            @keyframes flashEffect {
                0% { opacity: 0; }
                50% { opacity: 1; }
                100% { opacity: 0; }
            }
        `;
        document.head.appendChild(style);
        document.body.appendChild(flash);
        
        setTimeout(() => {
            if (flash.parentNode) {
                flash.parentNode.removeChild(flash);
            }
            if (style.parentNode) {
                style.parentNode.removeChild(style);
            }
        }, 500);
        
        nameDisplay.style.boxShadow = `
            0 0 50px rgba(255, 215, 0, 0.8),
            0 10px 30px rgba(0,0,0,0.2)
        `;
        
        setTimeout(() => {
            nameDisplay.style.boxShadow = '0 10px 30px rgba(0,0,0,0.1)';
        }, 2000);
    }
    
    function createParticles() {
        const particlesContainer = document.createElement('div');
        particlesContainer.className = 'particles';
        document.body.appendChild(particlesContainer);
        
        for (let i = 0; i < 50; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 4 + 's';
            particle.style.animationDuration = (3 + Math.random() * 2) + 's';
            
            const colors = ['#ff6b6b', '#4ecdc4', '#ffd166', '#95e1d3', '#f38ba8'];
            particle.style.background = colors[Math.floor(Math.random() * colors.length)];
            
            particlesContainer.appendChild(particle);
        }
        
        setTimeout(() => {
            if (particlesContainer.parentNode) {
                particlesContainer.parentNode.removeChild(particlesContainer);
            }
        }, 4000);
    }
    
    closeModal.addEventListener('click', () => {
        winnerModal.classList.remove('active');
    });

    document.addEventListener('keydown', (e) => {
        if (e.code === 'Space') {
            e.preventDefault();
            if (isSpinning) {
                stopDrawing();
            } else if (winnerModal.classList.contains('active')) {
                winnerModal.classList.remove('active');
            }
        }
    });

    document.getElementById('reset-btn').addEventListener('click', () => {
        if (confirm('确定要重置所有数据吗？')) {
            location.reload();
        }
    });

    function renderWinnerTable(newResults) {
        const tbody = document.querySelector('#winner-table tbody');
        newResults.forEach(r => {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${r.prize}</td><td>${r.name}</td>`;
            tbody.appendChild(tr);
        });
    }
    
    updateNameDisplay();
</script>

</body>
</html>
